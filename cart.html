<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Keranjang | Rodo's Shop</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="hero-box">

        <h1>🛒 Keranjang Belanja</h1>

        <p>
            Periksa kembali produk yang telah kamu pilih.
        </p>

        <div class="nav-btn">

            <a href="index.html" class="btn checkout">
                🏠 Beranda
            </a>

            <a href="checkout.html" class="btn cart">
                💳 Checkout
            </a>

        </div>

    </div>

</header>

<section class="container">

    <div class="product" style="width:700px;max-width:100%;">

        <h2 style="margin-bottom:20px;text-align:center;">
            Daftar Produk
        </h2>

        <div id="cartItems"></div>

        <hr style="margin:25px 0;">

        <h2 style="text-align:right;">
            Total :
            <span id="totalHarga">
                Rp0
            </span>
        </h2>

        <br>

        <button
        style="width:100%;"
        onclick="checkout()">

            💳 Checkout Sekarang

        </button>

        <br><br>

        <button
        style="width:100%;background:#e53935;"
        onclick="hapusSemua()">

            🗑 Kosongkan Keranjang

        </button>

    </div>

</section>

<footer>

    © 2026 Rodo's Shop

</footer>

<script src="cart.js"></script>

</body>

</html>
