<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodo's Shop</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <div class="hero-box">

            <h1>🍙 Rodo's Shop</h1>

            <p>
                Belanja makanan favoritmu dengan mudah,
                cepat, dan tanpa harus mengantri.
            </p>

            <div class="nav-btn">

                <a href="checkout.html" class="btn checkout">
                    🧾 Checkout
                </a>

                <a href="cart.html" class="btn cart" id="cartButton">
                    🛒 Keranjang
                </a>

            </div>

        </div>

    </header>

    <section class="container">
        <div class="product">
            <span class="badge">
                DISKON
            </span>
            <img src="onigiri.jpg" alt="Onigiri">
            <h3>🍙 Onigiri Nasi Uduk</h3>
            <p class="old-price">
                Rp12.000
            </p>

            <p class="price">
                Rp10.000
            </p>

            <button onclick="buyNow('Onigiri Nasi Uduk',10000,'onigiri.jpg')" class="btn-now">
             💳 Checkout Sekarang
            </button>
            
            <button onclick="addToCart('Onigiri Nasi Uduk',10000,'onigiri.jpg',this)">
                🛒 Masukkan Ke Keranjang
            </button>

        </div>

        <div class="product">

            <img src="es jeruk kunci.jpg" alt="Es Jeruk">

            <h3>🍊 Es Jeruk Kunci</h3>

            <p class="price">
                Rp7.000
            </p>

            <button onclick="buyNow('Es Jeruk Kunci',7000,'es jeruk kunci.jpg')">
                💳 Checkout Sekarang
            </button>
            
                <button onclick="addToCart('Es Jeruk Kunci',7000,'es jeruk kunci.jpg',this)">
                    🛒 Masukkan Ke Keranjang
                </button>

        </div>

    </section>

    <footer>

        <p>
            © 2026 Rodo's Shop | Belanja Mudah & Cepat
        </p>

    </footer>

    <div id="toast" class="toast">

        ✅ Produk berhasil ditambahkan!

    </div>

    <script src="script.js"></script>

</body>

</html>
