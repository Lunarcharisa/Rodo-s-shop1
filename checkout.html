<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout | Rodo's Shop</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="hero-box">

        <h1>💳 Checkout</h1>

        <p>
            Lengkapi data berikut untuk menyelesaikan pesananmu.
        </p>

        <div class="nav-btn">

            <a href="index.html" class="btn checkout">
                🏠 Beranda
            </a>

            <a href="cart.html" class="btn cart">
                🛒 Keranjang
            </a>

        </div>
    </div>

</header>


<section class="container">

<div class="product" style="width:700px;max-width:100%;padding:30px;">


<h2 style="text-align:center;margin-bottom:25px;">
Data Pembeli
</h2>

<form id="checkoutForm">

<label>Nama Lengkap</label>

<input
type="text"
id="nama"
required>

<br><br>

<label>Nomor HP</label>

<input
type="tel"
id="hp"
required>

<br><br>

<label>Alamat</label>

<textarea
id="alamat"
rows="4"
required></textarea>

<br><br>

<label>Metode Pembayaran</label>

<select id="metode" onchange="toggleQR()">

<option>Transfer Bank</option>
<option>QRIS</option>
<option>COD/Cash</option>

</select>

<div id="paymentInfo" style="margin-top:15px;"></div>

<div id="qrBox" style="display:none; margin-top:20px; text-align:center;">
    <h3>Scan QRIS untuk pembayaran</h3>
    <img src="contoh-qris.jpeg" style="width:250px;border-radius:12px;">
</div>

<br><br>

<h3>
Ringkasan Pesanan
</h3>

<div id="orderList"></div>

<hr>

<h2>
Total :
<span id="totalHarga">
Rp0
</span>
</h2>

<br>

<button
type="submit"
style="width:100%;">

✅ Buat Pesanan

</button>

</form>

</div>

</section>

<footer>

© 2026 Rodo's Shop

</footer>

<script src="checkout.js"></script>

</body>

</html>
